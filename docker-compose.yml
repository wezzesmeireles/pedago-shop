# ═══════════════════════════════════════════════════════════════
# Pedago Shop — Docker Compose para Dockploy
#
# Configure no Dockploy:
#   Repo   : wezzesmeireles/pedago-shop
#   Branch : develop
#   Compose: docker-compose.yml  (este arquivo)
#
# Todas as variáveis abaixo precisam ser preenchidas no painel
# do Dockploy em "Environment Variables" antes do primeiro deploy.
# ═══════════════════════════════════════════════════════════════

services:

  # ── Banco de dados ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - private-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Storage (MinIO) ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - private-network
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Endpoint público de arquivos
      - "traefik.http.routers.pedago-storage.rule=Host(`storage.${DOMAIN}`)"
      - "traefik.http.routers.pedago-storage.entrypoints=websecure"
      - "traefik.http.routers.pedago-storage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pedago-storage.service=pedago-storage-svc"
      - "traefik.http.services.pedago-storage-svc.loadbalancer.server.port=9000"
      # Console MinIO (opcional)
      - "traefik.http.routers.pedago-minio-ui.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.pedago-minio-ui.entrypoints=websecure"
      - "traefik.http.routers.pedago-minio-ui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pedago-minio-ui.service=pedago-minio-ui-svc"
      - "traefik.http.services.pedago-minio-ui-svc.loadbalancer.server.port=9001"

  # Cria os buckets na primeira inicialização
  minio-init:
    image: minio/mc:latest
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - private-network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/product-covers;
        mc mb --ignore-existing local/product-previews;
        mc mb --ignore-existing local/product-files;
        mc anonymous set public local/product-covers;
        mc anonymous set public local/product-previews;
        echo 'Buckets OK';
        exit 0;
      "

  # ── API (NestJS) ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: https://api.${DOMAIN}/auth/google/callback
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_USE_SSL: "false"
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_COVERS: product-covers
      S3_BUCKET_PREVIEWS: product-previews
      S3_BUCKET_FILES: product-files
      S3_PUBLIC_URL: https://storage.${DOMAIN}
      FRONTEND_URL: https://${DOMAIN}
      API_PORT: 3000
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    command: sh -c "prisma db push --accept-data-loss && node dist/main"
    networks:
      - private-network
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.pedago-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.pedago-api.entrypoints=websecure"
      - "traefik.http.routers.pedago-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.pedago-api.loadbalancer.server.port=3000"

  # ── Frontend (Vue + Nginx) ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: https://api.${DOMAIN}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTPS
      - "traefik.http.routers.pedago-web.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.pedago-web.entrypoints=websecure"
      - "traefik.http.routers.pedago-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.pedago-web.loadbalancer.server.port=80"
      # HTTP → HTTPS
      - "traefik.http.routers.pedago-web-http.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.pedago-web-http.entrypoints=web"
      - "traefik.http.routers.pedago-web-http.middlewares=pedago-https-redirect"
      - "traefik.http.middlewares.pedago-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.pedago-https-redirect.redirectscheme.permanent=true"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  # Rede interna (postgres, redis não ficam expostos)
  private-network:
    driver: bridge
    internal: true
  # Rede do Traefik do Dockploy — deve existir antes do deploy
  dokploy-network:
    external: true
