version: "3.8"

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pedago
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pedago_shop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedago"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pedago_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pedago:${POSTGRES_PASSWORD}@postgres:5432/pedago_shop
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${SERVICE_FQDN_APP}
      API_URL: ${SERVICE_FQDN_APP}
      NODE_ENV: production
      PORT: 3000
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET}
      MERCADO_PAGO_PIX_KEY: ${MERCADO_PAGO_PIX_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${SERVICE_FQDN_APP:-}/auth/google/callback
    volumes:
      - uploads_data:/app/apps/api/uploads
    networks:
      - pedago_net

volumes:
  postgres_data:
  uploads_data:

networks:
  pedago_net:
    driver: bridge
