# ═══════════════════════════════════════════════════════
# Pedago Shop — Docker Compose Base
# Usado como base para dev e staging via extends
# ═══════════════════════════════════════════════════════

services:

  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pedago}
      POSTGRES_USER: ${POSTGRES_USER:-pedago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pedago} -d ${POSTGRES_DB:-pedago}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - private-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - private-network
      - public-network
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── NestJS API ─────────────────────────────────────
  api:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio}
      S3_PORT: ${S3_PORT:-9000}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_COVERS: ${S3_BUCKET_COVERS:-product-covers}
      S3_BUCKET_PREVIEWS: ${S3_BUCKET_PREVIEWS:-product-previews}
      S3_BUCKET_FILES: ${S3_BUCKET_FILES:-product-files}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      API_PORT: ${API_PORT:-3000}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    networks:
      - private-network
      - public-network
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend Vite ──────────────────────────────────
  frontend:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3000}
    networks:
      - public-network
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../volumes/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../volumes/redis
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../volumes/minio

networks:
  public-network:
    driver: bridge
  private-network:
    driver: bridge
    internal: true
