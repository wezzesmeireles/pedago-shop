# ═══════════════════════════════════════════════════════
# Pedago Shop — Docker Compose Desenvolvimento
# Uso: docker compose -f docker/docker-compose.dev.yml up
# ═══════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pedago}
      POSTGRES_USER: ${POSTGRES_USER:-pedago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pedago_dev}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - dev-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pedago}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev} --appendonly yes
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_dev_data:/data
    networks:
      - dev-network
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initializer — roda uma vez e sai
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - dev-network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb --ignore-existing local/product-covers;
        mc mb --ignore-existing local/product-previews;
        mc mb --ignore-existing local/product-files;
        mc anonymous set public local/product-covers;
        mc anonymous set public local/product-previews;
        echo 'MinIO buckets prontos.';
        exit 0;
      "

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:

networks:
  dev-network:
    driver: bridge
