[phases.setup]
aptPkgs = ["nginx"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @pedago/shared build 2>/dev/null || true",
  "pnpm --filter api build",
  "pnpm --filter web build",
  "mkdir -p /usr/share/nginx/html",
  "cp -r apps/web/dist/* /usr/share/nginx/html/",
  "mkdir -p /etc/nginx/conf.d",
  "cp nginx.prod.conf /etc/nginx/conf.d/default.conf"
]

[start]
cmd = "node apps/api/dist/main.js & nginx -g 'daemon off;'"
