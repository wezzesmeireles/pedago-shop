<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrando…</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 48px 20px; color: #333; }
    .spin { width: 36px; height: 36px; border: 4px solid #eee; border-top-color: #7c3aed; border-radius: 50%; margin: 0 auto 20px; animation: r .8s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
    a.btn { display: inline-block; margin-top: 8px; background: #7c3aed; color: #fff; text-decoration: none; padding: 14px 28px; border-radius: 12px; font-weight: 600; font-size: 16px; }
  </style>
</head>
<body>
  <div class="spin"></div>
  <p>Concluindo o login no aplicativo…</p>
  <p style="margin-top:24px"><a class="btn" id="open" href="#">Abrir o aplicativo</a></p>
  <script>
    (function () {
      var q = window.location.search || '';

      // Quando carregado dentro do WebView do Tauri (tauriBridge presente),
      // navega direto para a rota do SPA que já sabe criar a sessão OAuth.
      if (window.tauriBridge) {
        window.location.replace('/auth/google-callback' + q);
        return;
      }

      // Fluxo externo (Chrome Custom Tab via novo código) — deep link nativo.
      var target = 'com.sitepedagogico.app://oauth' + q;
      document.getElementById('open').href = target;
      try { window.location.replace(target); } catch (e) {}
    })();
  </script>
</body>
</html>
