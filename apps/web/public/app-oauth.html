<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrando…</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 48px 20px; color: #444; }
    .spin { width: 36px; height: 36px; border: 4px solid #ddd; border-top-color: #7c3aed; border-radius: 50%; margin: 0 auto 20px; animation: r 0.8s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
    a { color: #7c3aed; }
  </style>
</head>
<body>
  <div class="spin"></div>
  <p>Concluindo o login no aplicativo…</p>
  <p id="fallback" style="display:none;margin-top:24px"></p>
  <script>
    // O Appwrite redireciona pra cá (host permitido) com ?userId=&secret= no
    // sucesso, ou ?error=... na falha. Reabrimos o app via deep link com esses
    // parâmetros — o app cria a sessão. Esta página só existe para fazer a ponte
    // Custom Tab (Chrome) -> app, já que o Google bloqueia OAuth em WebView.
    (function () {
      var q = window.location.search || '';
      var target = 'com.sitepedagogico.app://oauth' + q;
      window.location.replace(target);
      setTimeout(function () {
        var el = document.getElementById('fallback');
        el.style.display = 'block';
        el.innerHTML = 'Se o aplicativo não abrir, <a href="' + target + '">toque aqui</a>.';
      }, 1600);
    })();
  </script>
</body>
</html>
